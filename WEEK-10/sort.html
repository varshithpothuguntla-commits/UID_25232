<!DOCTYPE html>
<html>
<head>
    <title>Sort Three Numbers</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 {
            color: #11998e;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 8px;
            border-radius: 8px;
            border: 2px solid #11998e;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #38ef7d;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #11998e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0f7f75;
        }
    </style>

    <script>
        function sortNumbers() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);
            let c = Number(document.getElementById("num3").value);

            let result;

            if (a >= b && a >= c) {
                if (b >= c)
                    result = a + "," + b + "," + c;
                else
                    result = a + "," + c + "," + b;
            }
            else if (b >= a && b >= c) {
                if (a >= c)
                    result = b + "," + a + "," + c;
                else
                    result = b + "," + c + "," + a;
            }
            else {
                if (a >= b)
                    result = c + "," + a + "," + b;
                else
                    result = c + "," + b + "," + a;
            }

            alert("Sorted order: " + result);
        }
    </script>

</head>

<body>

<div class="container">
    <h2>Sort Three Numbers</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <input type="number" id="num3" placeholder="Enter third number">

    <br>

    <button onclick="sortNumbers()">Sort</button>
</div>

</body>
</html>
