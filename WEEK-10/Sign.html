<!DOCTYPE html>
<html>
<head>
    <title>Sign of Product</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 {
            color: #1d2671;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 8px;
            border-radius: 8px;
            border: 2px solid #1d2671;
            outline: none;
        }

        input:focus {
            border-color: #c33764;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
        }
    </style>

    <script>
        function findSign() {
            let a = document.getElementById("num1").value;
            let b = document.getElementById("num2").value;
            let c = document.getElementById("num3").value;

            let product = a * b * c;

            if (product > 0) {
                alert("The sign is plus (+)");
            } else if (product < 0) {
                alert("The sign is minus (-)");
            } else {
                alert("The product is zero (0)");
            }
        }
    </script>

</head>

<body>

<div class="container">
    <h2>Sign of Product</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <input type="number" id="num3" placeholder="Enter third number">

    <br>

    <button onclick="findSign()">Check Sign</button>
</div>

</body>
</html>
