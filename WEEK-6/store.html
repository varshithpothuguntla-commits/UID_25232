<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Store</title>
<style>
body{
    font-family:Arial;
    margin:0;
}
.container{
    display:grid;
    grid-template-columns:220px 1fr;
    grid-template-areas:
    "header header"
    "sale sale"
    "sidebar products"
    "footer footer";
}
.header{
    grid-area:header;
    background:aquamarine;
    padding:20px;
    text-align:center;
    font-size:28px;
}
.sale{
    grid-area:sale;
    background:blueviolet;
    color:white;
    padding:15px;
    text-align:center;
}
.sidebar{
    grid-area:sidebar;
    background:#f4f4f4;
    padding:20px;
}

.sidebar label{
    display:block;
    padding:8px;
    cursor:pointer;
    background:white;
    margin-bottom:10px;
    border-radius:5px;
}

.sidebar label:hover{
    background:lightblue;
}

.products{
    grid-area:products;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ccc;
    padding:15px;
    text-align:center;
    border-radius:10px;
    background:white;
    display:none;
}
.card img{
    width:100%;
    height:140px;     
    object-fit:contain;   
    background:#f2f2f2;
    padding:10px;
}
    

.price{
    color:green;
    font-weight:bold;
}

button{
    background:orange;
    border:none;
    padding:8px 12px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:red;
}

input{
    display:none;
}

#electronics:checked ~ .container .electronics,
#clothing:checked ~ .container .clothing,
#home:checked ~ .container .home,
#books:checked ~ .container .books{
    display:block;
}

#all:checked ~ .container .card{
    display:block;
}

.footer{
    grid-area:footer;
    background:black;
    color:white;
    text-align:center;
    padding:15px;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
grid-template-areas:
"header"
"sale"
"sidebar"
"products"
"footer";
}
}

</style>
</head>

<body>

<input type="radio" name="cat" id="all" checked>
<input type="radio" name="cat" id="electronics">
<input type="radio" name="cat" id="clothing">
<input type="radio" name="cat" id="home">
<input type="radio" name="cat" id="books">

<div class="container">

<div class="header">My E-Commerce Store</div>
<div class="sale">🔥 Mega Sale Up To 50% Off 🔥</div>

<div class="sidebar">
<h3>Categories</h3>
<label for="all">All</label>
<label for="electronics">Electronics</label>
<label for="clothing">Clothing</label>
<label for="home">Home Appliances</label>
<label for="books">Books</label>
</div>

<div class="products">

<div class="card electronics">
<img src="C:\Users\HP\Desktop\UID_25232\mobile.jpg">

</div>

</div>

<div class="card clothing">

<h4>T-Shirt</h4>

</div>

<div class="card clothing">
<img src="C:\Users\HP\Desktop\UID_25232\jeans.jpg">
<h4>Jeans</h4>
<p class="price">₹1299</p>
<button>Add to Cart</button>
</div>

<div class="card home">

<div class="footer">© copyright 2026 My Store</div>

</div>

</body>
</html>
