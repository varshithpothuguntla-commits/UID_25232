<!DOCTYPE html>
<html>
    <head>
        <title>College Admission Registration Form</title>
    </head>
    <body>
      <h2 style="text-align: center;">Collge Admission Registration</h2>  
      <form>
        <table border="1" cellpadding="8" cellspacing="0" align="center">
            <tr>
                <td><label for="fname">Full Name:</label></td>
                <td><input type="text" id="fname" name="fname"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>
            <tr>
                <td><label for="phone">Phone Number:</label></td>
                <td><input type="number" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" id="male" name="gender">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender">
                    <label for="other">Other</label>
                </td>
            </tr>
            <tr>
                <td><label for="course">Course Applying For:</label></td>
                <td>
                    <select id="course" name="course">
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>B.Com</option>
                        <option>BA</option>
                        <option>BBA</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Hobbies:</td>
                <td>
                    <input type="checkbox" id="sports">
                    <label for="sports">Sports</label>
                    <input type="checkbox" id="music">
                    <label for="music">Music</label>
                    <input type="checkbox" id="reading">
                    <label for="reading">Reading</label>
                </td>
            </tr>
            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td><input type="date" id="dob" name="dob"></td>
            </tr>
            <tr>
                <td><label for="file">Upload Certificates:</label></td>
                <td><input type="file" id="file" name="file"></td>
            </tr>
            <tr>
                <td><label for="address">Address</label></td>
                <td>
                    <textarea id="address" name="address" rows="5" cols="30"></textarea>
                </td>
            </tr>
            <tr>
                <td style="text-align: center;" colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
      </form>
    </body>
</html>
